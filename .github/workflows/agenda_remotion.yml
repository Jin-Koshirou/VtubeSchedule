name: Agenda VTubers – Remotion

on:
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Gerar/Preparar o Vídeo
        run: node scripts/build-video.js

      - name: Checar se o vídeo foi criado
        id: check_video
        run: |
          # O comando '-f' verifica se o arquivo existe no caminho especificado
          if [ -f "./out/agenda-hoje.mp4" ]; then
            echo "✅ Vídeo encontrado! Prosseguindo com o upload..."
            echo "video_exists=true" >> $GITHUB_ENV
          else
            echo "⚠️ Nenhum vídeo foi gerado nesta execução. Pulando as próximas etapas."
            echo "video_exists=false" >> $GITHUB_ENV
          fi
      
      - name: Criar Release Temporária (Upload)
        if: env.video_exists == 'true'
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: video-temporario-buffer
        run: |
          # 1. Tenta apagar a release antiga (o "|| true" evita que a action falhe na 1ª vez que rodar)
          gh release delete "$TAG_NAME" --cleanup-tag -y || true
          
          # 2. Aguarda uns segundinhos pro GitHub processar a exclusão
          sleep 5

          # 3. Cria a release nova com o arquivo atualizado
          # O comando 'gh release create' faz a release e já sobe o vídeo como asset
          gh release create "$TAG_NAME" ./out/agenda-hoje.mp4 \
            --title "Vídeo Ponte para o Buffer" \
            --notes "Este arquivo é substituído a cada nova execução."

          # 4. Montando a URL pública com um "cache buster" (run_id) para evitar cache de 404 do GitHub
          VIDEO_URL="https://github.com/${{ github.repository }}/releases/download/$TAG_NAME/agenda-hoje.mp4?v=${{ github.run_id }}"

          # Salva as variáveis para os próximos passos
          echo "VIDEO_URL=$VIDEO_URL" >> $GITHUB_ENV

      - name: Aguardar propagação do vídeo no GitHub
        if: env.video_exists == 'true'
        run: |
          echo "Verificando se o vídeo está acessível em: ${{ env.VIDEO_URL }}"
          
          # Tenta até 6 vezes (esperando 5s entre cada tentativa = 30 segundos no total)
          for i in {1..6}; do
            # Faz uma requisição simples (sem baixar o vídeo) e pega apenas o código HTTP
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.VIDEO_URL }}")
            
            # O GitHub retorna 302 (Redirect) quando o arquivo existe e está pronto para download
            if [ "$HTTP_STATUS" -eq 302 ]; then
              echo "✅ Vídeo acessível publicamente (HTTP 302)!"
              break
            fi
            
            echo "⏳ Ainda não acessível (HTTP $HTTP_STATUS). Tentativa $i de 6. Aguardando 5s..."
            sleep 5
          done

      - name: Rodar Script Node.js do Buffer
        if: env.video_exists == 'true'
        env:
          # O Node.js vai ler essas variáveis via process.env
          BUFFER_API_TOKEN: ${{ secrets.BUFFER_API_TOKEN }}
          TIKTOK_CHANNEL_ID: ${{ secrets.TIKTOK_CHANNEL_ID }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          VIDEO_URL: ${{ env.VIDEO_URL }} 
        run: node scripts/upload-buffer.js
